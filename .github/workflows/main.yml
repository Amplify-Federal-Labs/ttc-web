name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Restore Firebase config
        run: |
          echo "${{ secrets.FIREBASE_CONFIG_JSON }}" | base64 -d > firebaseConfig.json
      - name: Run linter
        run: npm run lint

      - name: Unit Tests
        run: npm run test --run

      - name: Build the app
        run: npm run build
        env:
          VITE_BACKEND_BASE_URL: ${{ vars.VITE_BACKEND_BASE_URL }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THOUGHTS_THAT_COUNT }}
          projectId: thoughts-that-count
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
